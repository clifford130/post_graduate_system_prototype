<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - PG Assessment & Progress System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-placeholder">🎓</div>
            <h2>Welcome</h2>
            <p>Postgraduate Assessment & Progress Management System</p>
        </div>

        <form class="login-form" action="#" method="POST">
            <div class="form-group">
                <label for="logincredential">Admission No./Staff No.</label>
                <input type="email" id="email" name="email" placeholder="Enter your credentials" required>
            </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" name="remember" /> Remember me
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn">Sign In</button>
      </form>
    </div>
    <script src="./login.js"></script>
  </body>
</html>
